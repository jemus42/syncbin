# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: claude
description: Claude Code - agentic coding CLI
flags:
  --add-dir=&: Additional directories to allow tool access to
  --agent=: Agent for the current session
  --agents=: JSON object defining custom agents
  --allow-dangerously-skip-permissions: Enable bypassing all permission checks as an option
  --append-system-prompt=: Append a system prompt to the default system prompt
  --bare: Minimal mode (skip hooks, LSP, plugin sync, auto-memory)
  --betas=&: Beta headers to include in API requests
  --brief: Enable SendUserMessage tool for agent-to-user communication
  --chrome: Enable Claude in Chrome integration
  -c, --continue: Continue the most recent conversation in the current directory
  --dangerously-skip-permissions: Bypass all permission checks
  -d, --debug=?: Enable debug mode with optional category filtering
  --debug-file=: Write debug logs to a specific file path
  --disable-slash-commands: Disable all skills
  --disallowedTools=&: Comma/space-separated list of tool names to deny
  --effort=: Effort level for the current session
  --exclude-dynamic-system-prompt-sections: Move per-machine sections into the first user message
  --fallback-model=: Automatic fallback model when default is overloaded
  --file=&: File resources to download at startup
  --fork-session: When resuming, create a new session ID
  --from-pr=?: Resume a session linked to a PR
  -h, --help: Display help for command
  --ide: Automatically connect to IDE on startup
  --include-hook-events: Include all hook lifecycle events in the output stream
  --include-partial-messages: Include partial message chunks as they arrive
  --input-format=: Input format (text or stream-json)
  --json-schema=: JSON Schema for structured output validation
  --max-budget-usd=: Maximum dollar amount to spend on API calls
  --mcp-config=&: Load MCP servers from JSON files or strings
  --model=: Model for the current session
  -n, --name=: Set a display name for this session
  --no-chrome: Disable Claude in Chrome integration
  --no-session-persistence: Disable session persistence
  --output-format=: Output format (text, json, stream-json)
  --permission-mode=: Permission mode to use for the session
  --plugin-dir=&: Load a plugin from a directory or .zip for this session
  --plugin-url=&: Fetch a plugin .zip from a URL for this session
  -p, --print: Print response and exit (useful for pipes)
  --remote-control=?: Start an interactive session with Remote Control enabled
  --remote-control-session-name-prefix=: Prefix for auto-generated Remote Control session names
  --replay-user-messages: Re-emit user messages from stdin back on stdout
  -r, --resume=?: Resume a conversation by session ID
  --session-id=: Use a specific session ID (must be a valid UUID)
  --setting-sources=: Comma-separated list of setting sources (user, project, local)
  --settings=: Path to a settings JSON file or a JSON string
  --strict-mcp-config: Only use MCP servers from --mcp-config
  --system-prompt=: System prompt to use for the session
  --tmux: Create a tmux session for the worktree (requires --worktree)
  --tools=&: Specify the list of available tools from the built-in set
  --verbose: Override verbose mode setting from config
  -v, --version: Output the version number
  -w, --worktree=?: Create a new git worktree for this session
completion:
  flag:
    add-dir: ["$files"]
    debug-file: ["$files"]
    effort: ["low", "medium", "high", "xhigh", "max"]
    fallback-model: ["opus", "sonnet", "haiku"]
    input-format: ["text", "stream-json"]
    mcp-config: ["$files"]
    model: ["opus", "sonnet", "haiku", "claude-opus-4-7", "claude-sonnet-4-6", "claude-haiku-4-5-20251001"]
    output-format: ["text", "json", "stream-json"]
    permission-mode: ["acceptEdits", "auto", "bypassPermissions", "default", "dontAsk", "plan"]
    plugin-dir: ["$files"]
    settings: ["$files"]
commands:
  - name: agents
    description: Manage background agents
    flags:
      --add-dir=&: Additional directory to allow tool access to
      --allow-dangerously-skip-permissions: Make bypass-permissions mode available
      --cwd=: Show only background sessions started under path
      --dangerously-skip-permissions: Alias for --permission-mode bypassPermissions
      --effort=: Default effort level for dispatched sessions
      -h, --help: Display help for command
      --mcp-config=&: MCP server configuration to apply
      --model=: Default model for dispatched sessions
      --permission-mode=: Default permission mode for dispatched sessions
      --plugin-dir=&: Load plugins from specified directory
      --setting-sources=: Comma-separated list of setting sources
      --settings=: Settings file or JSON string to apply
      --strict-mcp-config: Only use MCP servers from --mcp-config
    completion:
      flag:
        add-dir: ["$files"]
        cwd: ["$files"]
        effort: ["low", "medium", "high", "xhigh", "max"]
        mcp-config: ["$files"]
        model: ["opus", "sonnet", "haiku"]
        permission-mode: ["acceptEdits", "auto", "bypassPermissions", "default", "dontAsk", "plan"]
        plugin-dir: ["$files"]

  - name: auth
    description: Manage authentication
    flags:
      -h, --help: Display help for command
    commands:
      - name: login
        description: Sign in to your Anthropic account
        flags:
          -h, --help: Display help for command
      - name: logout
        description: Log out from your Anthropic account
        flags:
          -h, --help: Display help for command
      - name: status
        description: Show authentication status
        flags:
          -h, --help: Display help for command

  - name: auto-mode
    description: Inspect auto mode classifier configuration
    flags:
      -h, --help: Display help for command

  - name: doctor
    description: Check the health of your Claude Code auto-updater
    flags:
      -h, --help: Display help for command

  - name: install
    description: Install Claude Code native build
    flags:
      --force: Force installation even if already installed
      -h, --help: Display help for command
    completion:
      positional:
        - ["stable", "latest"]

  - name: mcp
    description: Configure and manage MCP servers
    flags:
      -h, --help: Display help for command
    commands:
      - name: add
        description: Add an MCP server to Claude Code
        flags:
          -h, --help: Display help for command
          -e, --env=&: Set environment variables (e.g. -e KEY=value)
          -H, --header=&: Set HTTP headers
          -s, --scope=: Configuration scope (local, user, project)
          -t, --transport=: Transport type (stdio, sse, http)
        completion:
          flag:
            scope: ["local", "user", "project"]
            transport: ["stdio", "sse", "http"]
      - name: add-from-claude-desktop
        description: Import MCP servers from Claude Desktop (Mac and WSL only)
        flags:
          -h, --help: Display help for command
          -s, --scope=: Configuration scope (local, user, project)
        completion:
          flag:
            scope: ["local", "user", "project"]
      - name: add-json
        description: Add an MCP server with a JSON string
        flags:
          -h, --help: Display help for command
          -s, --scope=: Configuration scope (local, user, project)
        completion:
          flag:
            scope: ["local", "user", "project"]
      - name: get
        description: Get details about an MCP server
        flags:
          -h, --help: Display help for command
      - name: list
        description: List configured MCP servers
        flags:
          -h, --help: Display help for command
      - name: remove
        description: Remove an MCP server
        flags:
          -h, --help: Display help for command
          -s, --scope=: Configuration scope (local, user, project)
        completion:
          flag:
            scope: ["local", "user", "project"]
      - name: reset-project-choices
        description: Reset approved/rejected project-scoped servers
        flags:
          -h, --help: Display help for command
      - name: serve
        description: Start the Claude Code MCP server
        flags:
          -h, --help: Display help for command

  - name: plugin
    description: Manage Claude Code plugins
    flags:
      -h, --help: Display help for command
    commands:
      - name: details
        description: Show a plugin's component inventory and token cost
        flags:
          -h, --help: Display help for command
      - name: disable
        description: Disable an enabled plugin
        flags:
          -h, --help: Display help for command
      - name: enable
        description: Enable a disabled plugin
        flags:
          -h, --help: Display help for command
      - name: install
        description: Install a plugin from available marketplaces
        flags:
          -h, --help: Display help for command
      - name: list
        description: List installed plugins
        flags:
          -h, --help: Display help for command
      - name: marketplace
        description: Manage Claude Code marketplaces
        flags:
          -h, --help: Display help for command
      - name: prune
        description: Remove auto-installed dependencies no longer needed
        flags:
          -h, --help: Display help for command
      - name: tag
        description: Create a release git tag for a plugin
        flags:
          -h, --help: Display help for command
      - name: uninstall
        description: Uninstall an installed plugin
        flags:
          -h, --help: Display help for command
      - name: update
        description: Update a plugin to the latest version
        flags:
          -h, --help: Display help for command
      - name: validate
        description: Validate a plugin or marketplace manifest
        flags:
          -h, --help: Display help for command
        completion:
          positional:
            - ["$files"]

  - name: project
    description: Manage Claude Code project state
    flags:
      -h, --help: Display help for command
    commands:
      - name: purge
        description: Delete all Claude Code state for a project
        flags:
          -h, --help: Display help for command
        completion:
          positional:
            - ["$files"]

  - name: setup-token
    description: Set up a long-lived authentication token
    flags:
      -h, --help: Display help for command

  - name: ultrareview
    description: Run a cloud-hosted multi-agent code review
    flags:
      -h, --help: Display help for command

  - name: update
    description: Check for updates and install if available
    flags:
      -h, --help: Display help for command
